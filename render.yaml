services:
  - type: web
    name: china-news-checker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 120 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DAILY_RUN_HOUR
        value: "8"
      - key: DAILY_RUN_MINUTE
        value: "0"
